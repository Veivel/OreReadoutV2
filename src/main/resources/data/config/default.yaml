# Config version (do not modify)
config_version: 3

# Targets to emit read-outs to
targets:
  - name: discord
    enabled: false
    webhook_url: ""
  - name: server-chat
    enabled: true
    notification_sound: false
  - name: server-console
    enabled: true

# The blocks that will count for read-outs
readout_blocks:
  - lapis_lazuli_ore
  - deepslate_lapis_lazuli_ore
  - gold_ore
  - deepslate_gold_ore
  - nether_gold_ore
  - diamond_ore
  - deepslate_diamond_ore
  - emerald_ore
  - deepslate_emerald_ore
  - ancient_debris

# Read-outs will be emitted every N number of seconds, specified here
readout_window_in_seconds: 5

# Read-outs will only be emitted if the number of blocks broken within
# a window reach this threshold
blocks_broken_threshold: 0

# Do not modify unless you need extra debugging logs in the server console
debug_mode: false
